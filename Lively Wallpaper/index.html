<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <script type="module">
        import 'https://cdn.jsdelivr.net/npm/@uimaxbai/am-lyrics/dist/src/am-lyrics.min.js';
    </script>

    <style>
        @font-face {
            font-family: 'Custom';
            src: url('font.ttf') format('truetype');
        }

        :root {
            --smooth: cubic-bezier(0.22, 1, 0.36, 1);
            --smooth-strong: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body,
        html {
            margin: 0;
            height: 100%;
            background: black;
            font-family: 'Custom', sans-serif;
            overflow: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        * {
            user-select: none;
            -webkit-user-select: none;
        }

        #bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.75);
            transform: scale(1.2);
            transition: opacity 0.6s ease;
        }

        #album {
            width: 420px;
            height: 420px;
            background-size: cover;
            background-position: center;
            margin: 0 auto 20px;
            border-radius: 0;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            transition: opacity 0.5s ease;
        }

        #center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            filter: blur(0px);
            transition:
                left 0.9s var(--smooth),
                filter 0.75s var(--smooth-strong),
                opacity 0.75s var(--smooth-strong);
        }

        body.lyrics-visible #center {
            left: 25.8%;
        }

        #title {
            font-size: 64px;
            margin: 0;
            max-width: min(760px, 46vw);
            white-space: normal;
            overflow-wrap: anywhere;
            line-height: 0.98;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        }

        #artist {
            font-size: 34px;
            margin-top: 4px;
            opacity: 0.9;
        }

        #songNote {
            font-size: 20px;
            margin-top: 3px;
            opacity: 0.7;
            min-height: 0;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
        }

        #songNote:empty {
            display: none;
        }

        #time {
            display: none;
            font-size: 26px;
            margin-top: 6px;
            opacity: 0.8;
        }

        #lyricsPanel {
            position: fixed;
            top: 3vh;
            right: 2.2vw;
            width: min(56vw, 1080px);
            height: 94vh;
            color: white;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translate3d(36px, 0, 0);
            filter: blur(18px);
            transition:
                opacity 0.95s var(--smooth),
                transform 0.95s var(--smooth),
                filter 0.95s var(--smooth),
                visibility 0s linear 0.95s;
        }

        body.lyrics-visible #lyricsPanel {
            opacity: 1;
            visibility: visible;
            transform: translate3d(0, 0, 0);
            filter: blur(0px);
            transition:
                opacity 0.95s var(--smooth),
                transform 0.95s var(--smooth),
                filter 0.95s var(--smooth),
                visibility 0s;
        }

        #lyricsViewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 13%,
                black 82%,
                transparent 100%
            );
            -webkit-mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 13%,
                black 82%,
                transparent 100%
            );
        }

        #lyricsScroller {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            padding: calc(47vh - 64px) 0 calc(47vh - 64px);
            box-sizing: border-box;
            transform: translate3d(0, 0, 0);
            transition: transform 0.56s var(--smooth);
            will-change: transform;
        }

        .lyric-line {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 0 8px 18px;
            margin: 24px 0;
            font-size: clamp(38px, 3.7vw, 74px);
            line-height: 1.05;
            font-weight: 900;
            letter-spacing: 0;
            color: rgba(255, 255, 255, 0.34);
            opacity: 0.3;
            filter: blur(4px);
            transform: translate3d(22px, 0, 0);
            text-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
            transition:
                opacity 0.42s var(--smooth),
                filter 0.42s var(--smooth),
                transform 0.42s var(--smooth),
                color 0.42s var(--smooth);
        }

        .lyric-line.near {
            opacity: 0.58;
            filter: blur(1.4px);
            transform: translate3d(8px, 0, 0);
        }

        .lyric-line.active {
            opacity: 1;
            filter: blur(0px);
            transform: translate3d(0, 0, 0);
            color: white;
        }

        .lyric-line.past {
            opacity: 0.84;
            filter: blur(0.45px);
            transform: translate3d(-6px, 0, 0);
            color: white;
        }

        .lyric-line.parenthetical {
            font-size: clamp(27px, 2.6vw, 52px);
            opacity: 0.56;
            margin: 12px 0;
        }

        .lyric-line.future {
            color: rgba(255, 255, 255, 0.34);
        }

        .lyric-line[dir="rtl"] {
            direction: rtl;
            text-align: right;
            padding-left: 0;
            padding-right: 18px;
        }

        .lyric-syllable {
            display: inline-block;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.34);
            filter: blur(0.55px);
            transform: translate3d(0, 0, 0);
            transition:
                color 0.28s var(--smooth),
                filter 0.28s var(--smooth),
                transform 0.28s var(--smooth),
                text-shadow 0.28s var(--smooth);
        }

        .lyric-line.active .lyric-syllable {
            color: rgba(255, 255, 255, 0.36);
            filter: blur(0px);
        }

        .lyric-line.past .lyric-syllable,
        .lyric-syllable.done {
            color: white;
        }

        .lyric-line.future .lyric-syllable {
            color: rgba(255, 255, 255, 0.34);
        }

        .lyric-syllable.current {
            --progress: 0%;
            color: transparent;
            background-image: linear-gradient(
                90deg,
                #ffffff 0%,
                #ffffff var(--progress),
                rgba(255, 255, 255, 0.36) var(--progress),
                rgba(255, 255, 255, 0.36) 100%
            );
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translate3d(0, -2px, 0);
            text-shadow: 0 0 22px rgba(255, 255, 255, 0.25);
        }

        .lyric-line[dir="rtl"] .lyric-syllable.current {
            background-image: linear-gradient(
                -90deg,
                #ffffff 0%,
                #ffffff var(--progress),
                rgba(255, 255, 255, 0.36) var(--progress),
                rgba(255, 255, 255, 0.36) 100%
            );
        }

        .background-lyrics {
            display: block;
            margin-top: 0.18em;
            font-size: 0.62em;
            line-height: 1.05;
            opacity: 0.56;
        }

        .lyric-line.active .lyric-syllable.done,
        .lyric-syllable.done {
            color: white;
            background-image: none;
            background-clip: border-box;
            -webkit-background-clip: border-box;
            -webkit-text-fill-color: white;
            filter: blur(0px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.18);
        }

        #lyricsCredits {
            position: fixed;
            left: 34px;
            bottom: 62px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 22px;
            letter-spacing: 0.01em;
            text-shadow: 0 5px 22px rgba(0, 0, 0, 0.55);
            opacity: 0;
            visibility: hidden;
            transform: translate3d(0, 14px, 0);
            filter: blur(9px);
            pointer-events: none;
            transition:
                opacity 0.85s var(--smooth),
                transform 0.85s var(--smooth),
                filter 0.85s var(--smooth),
                visibility 0s linear 0.85s;
        }

        body.lyrics-visible:not(.lyrics-ended) #lyricsCredits {
            opacity: 1;
            visibility: visible;
            transform: translate3d(0, 0, 0);
            filter: blur(0px);
            transition:
                opacity 0.85s var(--smooth),
                transform 0.85s var(--smooth),
                filter 0.85s var(--smooth),
                visibility 0s;
        }

        #lyricsProvider {
            position: fixed;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.01);
        }
    </style>
</head>

<body>

    <div id="bg"></div>

    <div id="center">
        <div id="album"></div>
        <h1 id="title">No music playing</h1>
        <div id="artist"></div>
        <div id="songNote"></div>
        <div id="time" hidden></div>
    </div>

    <div id="lyricsPanel" aria-hidden="true">
        <div id="lyricsViewport">
            <div id="lyricsScroller"></div>
        </div>
    </div>

    <div id="lyricsCredits">Credits To binimum/am-lyrics For the lyrics</div>

    <div id="lyricsProvider" aria-hidden="true"></div>

<script>
    const bg = document.getElementById('bg');
    const album = document.getElementById('album');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const songNoteEl = document.getElementById('songNote');
    const timeEl = document.getElementById('time');

    const lyricsProviderHost = document.getElementById('lyricsProvider');
    const lyricsPanel = document.getElementById('lyricsPanel');
    const lyricsViewport = document.getElementById('lyricsViewport');
    const lyricsScroller = document.getElementById('lyricsScroller');
    const lyricsCredits = document.getElementById('lyricsCredits');

    let duration = 0;

    let basePosition = 0;
    let baseTime = performance.now();

    let isPlaying = false;
    let currentThumb = '';

    let lastTimelinePosition = null;
    let lastTitle = '';

    const BACKWARD_JITTER = 1.1;

    const BACKWARD_SEEK = 2.0;

    const LYRICS_TIME_OFFSET_MS = 500;
    const LYRICS_SEARCH_DEBOUNCE_MS = 120;
    const MIN_PROVIDER_SETTLE_MS = 500;
    const STALE_LYRICS_BLOCK_MS = 11000;
    const PROVIDER_CLOCK_THROTTLE_MS = 420;
    const LYRICS_VISUAL_INTERVAL_MS = 33;
    const LYRICS_BACKWARD_LOCK_MS = 900000;
    const EXTERNAL_POSITION_SYNC_THRESHOLD = 2.0;
    const EXTERNAL_POSITION_SEEK_THRESHOLD = 0.5;

    let mediaTitle = '';
    let mediaArtist = '';
    let lyricsRequestId = 0;
    let lyricsSearchTimer = null;
    let activeLyricsProvider = null;
    let lastLyricsDurationMs = -1;
    let syncedLyrics = [];
    let lyricsLineEls = [];
    let activeLyricIndex = -1;
    let visibleLyrics = false;
    let activeSongKey = '';
    let lastObservedLyricsFingerprint = '';
    let lastObservedLyricsSongKey = '';
    let lastRenderedLyricsFingerprint = '';
    let lastRenderedLyricsSongKey = '';
    let stableLyricsTimeMs = 0;
    let stableLyricsSongKey = '';
    let allowLyricsBackwardUntil = 0;
    let lastProviderClockSentAt = 0;
    let lastLyricsVisualUpdateAt = 0;

    function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
    }

    function formatTime(sec) {
        if (!Number.isFinite(sec) || sec < 0) sec = 0;

        sec = Math.floor(sec);

        const m = Math.floor(sec / 60);
        const s = String(sec % 60).padStart(2, '0');

        return `${m}:${s}`;
    }

    function getEstimatedPosition(now = performance.now()) {
        let pos = basePosition;

        if (isPlaying) {
            pos += (now - baseTime) / 1000;
        }

        if (duration > 0) {
            pos = clamp(pos, 0, duration);
        }

        return Math.max(0, pos);
    }

    function setBasePosition(pos, now = performance.now()) {
        basePosition = duration > 0
            ? clamp(pos, 0, duration)
            : Math.max(0, pos);

        baseTime = now;
    }

    function normalizeExternalPositionSeconds(pos) {
        let value = Number(pos);
        if (!Number.isFinite(value) || value < 0) return null;

        if (duration > 0 && value > duration + 2) {
            const asMilliseconds = value / 1000;
            const asTicks = value / 10000000;

            if (asMilliseconds <= duration + 2) {
                value = asMilliseconds;
            } else if (asTicks <= duration + 2) {
                value = asTicks;
            }
        }

        return duration > 0
            ? clamp(value, 0, duration)
            : Math.max(0, value);
    }

    function syncToExternalSongPosition(externalPosition, now = performance.now()) {
        const nextPosition = normalizeExternalPositionSeconds(externalPosition);
        if (nextPosition === null) return false;

        const estimated = getEstimatedPosition(now);
        const drift = nextPosition - estimated;
        const positionDelta = lastTimelinePosition === null
            ? Infinity
            : Math.abs(nextPosition - lastTimelinePosition);
        const looksLikeSeek = positionDelta >= EXTERNAL_POSITION_SEEK_THRESHOLD;
        const externalMoved = positionDelta > 0.04;
        const shouldJump = (
            !hasExternalSongPosition ||
            !isPlaying ||
            looksLikeSeek ||
            Math.abs(drift) >= EXTERNAL_POSITION_SYNC_THRESHOLD
        );

        hasExternalSongPosition = true;
        lastExternalSongPositionAt = now;
        lastTimelinePosition = nextPosition;

        if (!shouldJump) return false;

        setBasePosition(nextPosition, now);
        pushLyricsClock(nextPosition, now, true);
        return true;
    }

    function setPlaybackState(playing, now = performance.now()) {
        const nextPlaying = Boolean(playing);
        if (isPlaying === nextPlaying) return;

        setBasePosition(getEstimatedPosition(now), now);
        isPlaying = nextPlaying;
    }

    function updateHiddenSongTime(pos) {
        timeEl.hidden = true;
        timeEl.textContent = '';
        timeEl.dataset.positionSeconds = String(pos);
        timeEl.dataset.position = formatTime(pos);
        timeEl.dataset.durationSeconds = duration > 0 ? String(duration) : '';
        timeEl.dataset.duration = duration > 0 ? formatTime(duration) : '';
    }

    function getLyricsTimeMs(pos) {
        return (pos * 1000) + LYRICS_TIME_OFFSET_MS;
    }

    function pushLyricsClock(pos, now = performance.now(), force = false) {
        const lyricsTimeMs = getLyricsTimeMs(pos);

        stableLyricsTimeMs = lyricsTimeMs;
        updateHiddenSongTime(pos);
        updateProviderClock(lyricsTimeMs, now, force);
        updateLyricsClock(lyricsTimeMs, now, force);
    }

    function updateTime() {
        const now = performance.now();
        const pos = getEstimatedPosition(now);

        updateHiddenSongTime(pos);

        updateLyricsEndedState(pos);

        requestAnimationFrame(updateTime);
    }

    function updateLyricsFrame() {
        const now = performance.now();

        if (
            (mediaTitle || visibleLyrics || activeLyricsProvider) &&
            now - lastLyricsVisualUpdateAt >= LYRICS_VISUAL_INTERVAL_MS
        ) {
            lastLyricsVisualUpdateAt = now;

            const pos = getEstimatedPosition(now);

            pushLyricsClock(pos, now);
        }

        requestAnimationFrame(updateLyricsFrame);
    }

    requestAnimationFrame(updateTime);
    requestAnimationFrame(updateLyricsFrame);

    function setLyricsVisible(value) {
        if (visibleLyrics === value) return;
        visibleLyrics = value;
        document.body.classList.toggle('lyrics-visible', value);
        if (value) document.body.classList.remove('lyrics-ended');
        lyricsPanel.setAttribute('aria-hidden', value ? 'false' : 'true');
    }

    function updateLyricsEndedState(pos) {
        const ended = duration > 0 && pos >= Math.max(0, duration - 0.18);
        document.body.classList.toggle('lyrics-ended', ended || !visibleLyrics);
    }

    function resetStableLyricsClock() {
        stableLyricsTimeMs = 0;
        stableLyricsSongKey = activeSongKey;
        allowLyricsBackwardUntil = 0;
        lastProviderClockSentAt = 0;
    }

    function getStableLyricsTime(rawTimeMs, now = performance.now()) {
        if (stableLyricsSongKey !== activeSongKey) {
            stableLyricsSongKey = activeSongKey;
            stableLyricsTimeMs = rawTimeMs;
            return rawTimeMs;
        }

        const backwardDiff = stableLyricsTimeMs - rawTimeMs;

        if (
            isPlaying &&
            backwardDiff > 0 &&
            now > allowLyricsBackwardUntil
        ) {
            return stableLyricsTimeMs;
        }

        stableLyricsTimeMs = rawTimeMs;
        return rawTimeMs;
    }

    function updateProviderClock(timeMs, now = performance.now(), force = false) {
        if (!activeLyricsProvider) return;
        if (!force && now - lastProviderClockSentAt < PROVIDER_CLOCK_THROTTLE_MS) return;

        lastProviderClockSentAt = now;
        activeLyricsProvider.currentTime = timeMs;

        if (duration > 0) {
            const durationMs = Math.round(duration * 1000);

            if (durationMs !== lastLyricsDurationMs) {
                lastLyricsDurationMs = durationMs;
                activeLyricsProvider.songDurationMs = durationMs;
                activeLyricsProvider.setAttribute('song-duration', String(durationMs));
            }
        }
    }

    function clearLyrics() {
        syncedLyrics = [];
        lyricsLineEls = [];
        activeLyricIndex = -1;
        lyricsScroller.innerHTML = '';
        lyricsScroller.style.transform = 'translate3d(0, 0, 0)';
        setLyricsVisible(false);
        document.body.classList.add('lyrics-ended');
    }

    function normalizeText(value) {
        return String(value || '')
            .replace(/\s*\([^)]*(official|video|audio|lyrics|visualizer|remaster|remastered)[^)]*\)\s*/gi, ' ')
            .replace(/\s*\[[^\]]*(official|video|audio|lyrics|visualizer|remaster|remastered)[^\]]*\]\s*/gi, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function splitFeaturedArtists(rawTitle, rawArtist) {
        let title = String(rawTitle || '').trim();
        let artist = String(rawArtist || '').trim();
        const featured = [];
        const titleNotes = [];

        title = title.replace(/\s*[\(\[]\s*(?:feat\.?|ft\.?|featuring)\s+([^\)\]]+)[\)\]]\s*/gi, (_, names) => {
            if (names && names.trim()) featured.push(names.trim());
            return ' ';
        });

        title = title.replace(/\s+-\s*(?:feat\.?|ft\.?|featuring)\s+(.+)$/i, (_, names) => {
            if (names && names.trim()) featured.push(names.trim());
            return '';
        });

        title = title.replace(/\s*[\(\[]\s*([^\)\]]+?)\s*[\)\]]\s*/g, (_, note) => {
            const cleanNote = String(note || '').replace(/\s+/g, ' ').trim();
            if (cleanNote && !/^(feat\.?|ft\.?|featuring)\b/i.test(cleanNote)) {
                titleNotes.push(cleanNote);
            }
            return ' ';
        });

        title = title.replace(/\s+/g, ' ').trim();

        const allArtists = [artist, ...featured]
            .map(part => part.replace(/\s+/g, ' ').trim())
            .filter(Boolean);

        return {
            title,
            artist: allArtists.join(', '),
            featured: featured.join(', '),
            note: titleNotes.join(' ֲ· ')
        };
    }

    function makeSongKey(title, artist) {
        return `${normalizeText(title).toLowerCase()}::${normalizeText(artist).toLowerCase()}`;
    }

    function getLinePlainText(line) {
        if (!line) return '';
        const main = Array.isArray(line.text)
            ? line.text.map(s => String(s.text || '')).join('')
            : String(line.text || '');

        const background = Array.isArray(line.backgroundText)
            ? line.backgroundText.map(s => String(s.text || '')).join('')
            : '';

        return `${main}${background}`.replace(/\s+/g, ' ').trim();
    }

    function getLyricsFingerprint(lines) {
        if (!Array.isArray(lines) || lines.length === 0) return '';

        return lines
            .slice(0, 10)
            .map(line => `${Math.round(Number(line && line.timestamp) || 0)}:${getLinePlainText(line)}`)
            .join('|')
            .toLowerCase();
    }

    function hasRTL(text) {
        return /[\u0590-\u05FF\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(text);
    }

    function isUsefulSyllable(syllable) {
        const start = Number(syllable && syllable.timestamp);
        const end = Number(syllable && syllable.endtime);
        const text = String((syllable && syllable.text) || '').trim();

        return text && Number.isFinite(start) && Number.isFinite(end) && end > start && !syllable.lineSynced;
    }

    function hasRealWordTiming(syllables) {
        const useful = syllables.filter(isUsefulSyllable);
        if (useful.length < 2) return false;

        const starts = useful.map(s => Math.round(Number(s.timestamp) || 0));
        const uniqueStarts = new Set(starts);
        const first = Math.min(...starts);
        const last = Math.max(...starts);

        return uniqueStarts.size >= 2 && (last - first) >= 180;
    }

    function hasKaraokeLyrics(lines) {
        if (!Array.isArray(lines) || lines.length === 0) return false;

        return lines.some(line => {
            if (!line || line.isWordSynced === false || line.lineSynced === true) return false;
            const syllables = Array.isArray(line.text) ? line.text : [];
            return hasRealWordTiming(syllables);
        });
    }

    function isParentheticalLineText(text) {
        const value = String(text || '').trim();
        return /^[\(\[]/.test(value) && /[\)\]]$/.test(value);
    }

    function stripOuterParenthesisText(text, isFirst, isLast) {
        let value = String(text || '');

        if (isFirst) {
            value = value.replace(/^\s*[\(\[]\s*/, match => match.replace(/[\(\[]/g, ''));
        }

        if (isLast) {
            value = value.replace(/\s*[\)\]]\s*$/, match => match.replace(/[\)\]]/g, ''));
        }

        return value;
    }

    function appendTimedSyllables(parent, syllables, lineStart, lineEnd, stripOuterParentheses) {
        const items = Array.isArray(syllables) ? syllables : [];
        const nonEmptyIndexes = items
            .map((item, index) => ({ item, index }))
            .filter(({ item }) => String((item && item.text) || '').trim().length > 0)
            .map(({ index }) => index);

        const firstTextIndex = nonEmptyIndexes.length ? nonEmptyIndexes[0] : -1;
        const lastTextIndex = nonEmptyIndexes.length ? nonEmptyIndexes[nonEmptyIndexes.length - 1] : -1;

        items.forEach((syllable, syllableIndex) => {
            const span = document.createElement('span');
            span.className = 'lyric-syllable';

            let text = String((syllable && syllable.text) || '');
            if (stripOuterParentheses) {
                text = stripOuterParenthesisText(
                    text,
                    syllableIndex === firstTextIndex,
                    syllableIndex === lastTextIndex
                );
            }

            span.textContent = text;
            span.dataset.start = String(Number(syllable && syllable.timestamp) || lineStart || 0);
            span.dataset.end = String(Number(syllable && syllable.endtime) || lineEnd || 0);
            parent.appendChild(span);
        });
    }

    function renderLyrics(lines) {
        lyricsScroller.innerHTML = '';
        syncedLyrics = lines;
        lyricsLineEls = [];
        activeLyricIndex = -1;

        const fragment = document.createDocumentFragment();

        lines.forEach((line, index) => {
            const lineEl = document.createElement('div');
            lineEl.className = 'lyric-line';
            lineEl.dataset.index = String(index);
            lineEl.dataset.start = String(Number(line.timestamp) || 0);
            lineEl.dataset.end = String(Number(line.endtime) || 0);

            const mainText = Array.isArray(line.text)
                ? line.text.map(s => String(s.text || '')).join('')
                : '';

            const lineStart = Number(line.timestamp) || 0;
            const lineEnd = Number(line.endtime) || lineStart;
            const isParenthetical = isParentheticalLineText(mainText);

            lineEl.dir = hasRTL(mainText) ? 'rtl' : 'ltr';
            lineEl.classList.toggle('parenthetical', isParenthetical);

            const mainSyllables = Array.isArray(line.text) ? line.text : [];
            appendTimedSyllables(lineEl, mainSyllables, lineStart, lineEnd, isParenthetical);

            if (Array.isArray(line.backgroundText) && line.backgroundText.length > 0) {
                const bgLine = document.createElement('span');
                bgLine.className = 'background-lyrics';

                const backgroundText = line.backgroundText.map(s => String(s.text || '')).join('');
                appendTimedSyllables(
                    bgLine,
                    line.backgroundText,
                    Number(line.timestamp) || 0,
                    Number(line.endtime) || Number(line.timestamp) || 0,
                    isParentheticalLineText(backgroundText)
                );

                lineEl.appendChild(bgLine);
            }

            fragment.appendChild(lineEl);
            lyricsLineEls.push(lineEl);
        });

        lyricsScroller.appendChild(fragment);

        requestAnimationFrame(() => {
            const now = performance.now();
            const pos = getEstimatedPosition(now);
            pushLyricsClock(pos, now, true);
        });
    }

    function getActiveLyricIndex(timeMs) {
        if (!syncedLyrics.length) return -1;

        const currentLine = syncedLyrics[activeLyricIndex];
        if (currentLine) {
            const start = Number(currentLine.timestamp) || 0;
            const end = Number(currentLine.endtime) || 0;
            if (timeMs >= start && timeMs < end) {
                return activeLyricIndex;
            }
        }

        let lastPast = 0;

        for (let i = 0; i < syncedLyrics.length; i += 1) {
            const line = syncedLyrics[i];
            const start = Number(line.timestamp) || 0;
            const end = Number(line.endtime) || start;

            if (timeMs >= start && timeMs < end) {
                return i;
            }

            if (timeMs >= start) {
                lastPast = i;
            }

            if (start > timeMs) {
                break;
            }
        }

        return lastPast;
    }

    function updateLineClasses(index) {
        lyricsLineEls.forEach((lineEl, i) => {
            lineEl.classList.toggle('active', i === index);
            lineEl.classList.toggle('near', Math.abs(i - index) <= 2 && i !== index);
            lineEl.classList.toggle('past', i < index);
            lineEl.classList.toggle('future', i > index);
        });
    }

    function scrollLyricsTo(index) {
        const lineEl = lyricsLineEls[index];
        if (!lineEl) return;

        const lineCenter = lineEl.offsetTop + (lineEl.offsetHeight / 2);
        const viewportCenter = lyricsViewport.clientHeight * 0.5;
        const maxScroll = Math.max(0, lyricsScroller.scrollHeight - lyricsViewport.clientHeight);
        const target = clamp(lineCenter - viewportCenter, 0, maxScroll);

        lyricsScroller.style.transform = `translate3d(0, ${-target}px, 0)`;
    }

    function updateSyllables(timeMs, lineIndex) {
        const startIndex = Math.max(0, lineIndex - 1);
        const endIndex = Math.min(lyricsLineEls.length - 1, lineIndex + 1);

        for (let i = startIndex; i <= endIndex; i += 1) {
            const lineEl = lyricsLineEls[i];
            if (!lineEl) continue;

            const syllables = lineEl.querySelectorAll('.lyric-syllable');
            syllables.forEach(span => {
                const start = Number(span.dataset.start) || 0;
                const end = Number(span.dataset.end) || start;
                const isDone = timeMs >= end;
                const isCurrent = timeMs >= start && timeMs < end && end > start;

                span.classList.toggle('done', isDone);
                span.classList.toggle('current', isCurrent);

                if (isCurrent) {
                    const progress = clamp(((timeMs - start) / (end - start)) * 100, 0, 100);
                    span.style.setProperty('--progress', `${progress.toFixed(2)}%`);
                } else {
                    span.style.removeProperty('--progress');
                }
            });
        }
    }

    function clearCurrentSyllableHighlights() {
        lyricsScroller.querySelectorAll('.lyric-syllable.current').forEach(span => {
            span.classList.remove('current');
            span.style.removeProperty('--progress');
        });
    }

    function updateLyricsClock(timeMs, now = performance.now(), force = false) {
        if (syncedLyrics.length === 0) return;

        let index = getActiveLyricIndex(timeMs);
        if (index === -1) return;

        if (
            !force &&
            activeLyricIndex !== -1 &&
            index < activeLyricIndex &&
            now > allowLyricsBackwardUntil
        ) {
            index = activeLyricIndex;
        }

        if (index !== activeLyricIndex) {
            clearCurrentSyllableHighlights();
            activeLyricIndex = index;
            updateLineClasses(index);
            scrollLyricsTo(index);
        }

        updateSyllables(timeMs, index);
    }

    function hideProviderChrome(provider) {
        if (!provider || !provider.shadowRoot || provider.shadowRoot.getElementById('imusic-clean-style')) return;

        const style = document.createElement('style');
        style.id = 'imusic-clean-style';
        style.textContent = `
            .lyrics-header,
            .lyrics-footer,
            .header-controls,
            .footer-controls,
            .download-controls,
            .download-button,
            .control-button,
            .format-select,
            .lyrics-plus-metadata,
            .lyrics-plus-empty,
            .no-lyrics,
            .skeleton-line {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
            }
        `;

        provider.shadowRoot.appendChild(style);
    }

    function scheduleLyricsSearch() {
        clearTimeout(lyricsSearchTimer);

        const cleanTitle = normalizeText(mediaTitle);
        const cleanArtist = normalizeText(mediaArtist);
        activeSongKey = makeSongKey(cleanTitle, cleanArtist);
        resetStableLyricsClock();

        lyricsRequestId += 1;
        activeLyricsProvider = null;
        lastLyricsDurationMs = -1;
        lyricsProviderHost.innerHTML = '';
        clearLyrics();

        if (!cleanTitle) {
            return;
        }

        const tokenTitle = cleanTitle;
        const tokenArtist = cleanArtist;
        const tokenSongKey = activeSongKey;

        lyricsSearchTimer = setTimeout(() => {
            if (tokenSongKey !== activeSongKey) return;
            requestLyrics(tokenTitle, tokenArtist, tokenSongKey);
        }, LYRICS_SEARCH_DEBOUNCE_MS);
    }

    function requestLyrics(title, artist, songKey = makeSongKey(title, artist)) {
        lyricsRequestId += 1;
        const token = lyricsRequestId;

        clearLyrics();
        lyricsProviderHost.innerHTML = '';

        const provider = document.createElement('am-lyrics');
        provider.dataset.songKey = songKey;
        activeLyricsProvider = provider;
        lastLyricsDurationMs = -1;
        lastProviderClockSentAt = 0;

        provider.setAttribute('song-title', title);
        provider.songTitle = title;

        if (artist) {
            provider.setAttribute('song-artist', artist);
            provider.songArtist = artist;
        }

        const query = artist ? `${title} ${artist}` : title;
        provider.setAttribute('query', query);
        provider.query = query;
        provider.setAttribute('highlight-color', '#ffffff');
        provider.setAttribute('font-family', "'Custom', sans-serif");
        provider.setAttribute('autoscroll', '');
        provider.setAttribute('interpolate', '');

        if (duration > 0) {
            const durationMs = Math.round(duration * 1000);
            provider.setAttribute('song-duration', String(durationMs));
            provider.songDurationMs = durationMs;
        }

        lyricsProviderHost.appendChild(provider);
        watchLyricsProvider(provider, token, songKey);
    }

    function watchLyricsProvider(provider, token, songKey) {
        const startedAt = performance.now();
        let renderedRef = null;
        let renderedFingerprint = '';

        function tick() {
            if (token !== lyricsRequestId || provider !== activeLyricsProvider || songKey !== activeSongKey) return;

            hideProviderChrome(provider);

            const lines = Array.isArray(provider.lyrics) ? provider.lyrics : [];

            if (lines.length > 0) {
                const fingerprint = getLyricsFingerprint(lines);
                const elapsed = performance.now() - startedAt;

                if (fingerprint) {
                    const looksLikeOldLyrics = (
                        lastObservedLyricsFingerprint === fingerprint &&
                        lastObservedLyricsSongKey &&
                        lastObservedLyricsSongKey !== songKey
                    ) || (
                        lastRenderedLyricsFingerprint === fingerprint &&
                        lastRenderedLyricsSongKey &&
                        lastRenderedLyricsSongKey !== songKey
                    );

                    if (looksLikeOldLyrics) {
                        if (elapsed < STALE_LYRICS_BLOCK_MS) {
                            setTimeout(tick, 180);
                            return;
                        }

                        clearLyrics();
                        return;
                    }

                    lastObservedLyricsFingerprint = fingerprint;
                    lastObservedLyricsSongKey = songKey;
                }

                if (hasKaraokeLyrics(lines)) {
                    if (elapsed < MIN_PROVIDER_SETTLE_MS) {
                        setTimeout(tick, 120);
                        return;
                    }

                    if (renderedRef !== lines || renderedFingerprint !== fingerprint) {
                        renderedRef = lines;
                        renderedFingerprint = fingerprint;
                        lastRenderedLyricsFingerprint = fingerprint;
                        lastRenderedLyricsSongKey = songKey;
                        renderLyrics(lines);
                    }

                    setLyricsVisible(true);
                    setTimeout(tick, 260);
                    return;
                }

                lastObservedLyricsFingerprint = fingerprint;
                lastObservedLyricsSongKey = songKey;
                clearLyrics();

                if (elapsed < 3500) {
                    setTimeout(tick, 260);
                }

                return;
            }

            if (performance.now() - startedAt > 11000) {
                clearLyrics();
                return;
            }

            setTimeout(tick, 180);
        }

        tick();
    }
    const AUDIO_ACTIVE_THRESHOLD = 0.015;
    const AUDIO_IDLE_MS = 120;
    let lastAudioHeardAt = 0;
    let livelyAudioStartedAt = 0;
    let livelyHasAudioSignal = false;
    let livelyReceivedAudio = false;
    let livelyWallpaperPaused = false;
    let lastPlaybackStateExplicit = false;
    let hasExternalSongPosition = false;
    let lastExternalSongPositionAt = 0;

    function getTrackField(track, keys) {
        for (const key of keys) {
            if (track && track[key] !== undefined && track[key] !== null && String(track[key]).trim() !== '') {
                return track[key];
            }
        }

        return '';
    }

    function getNestedField(source, path) {
        if (!source || !path) return undefined;

        return String(path)
            .split('.')
            .reduce((value, part) => {
                if (value === undefined || value === null) return undefined;
                return value[part];
            }, source);
    }

    function parseClockValue(value, preferMilliseconds = false, preferTicks = false) {
        if (value === undefined || value === null || value === '') return null;

        if (typeof value === 'object') {
            const objectFields = [
                ['TotalSeconds', false, false],
                ['totalSeconds', false, false],
                ['Seconds', false, false],
                ['seconds', false, false],
                ['TotalMilliseconds', true, false],
                ['totalMilliseconds', true, false],
                ['Milliseconds', true, false],
                ['milliseconds', true, false],
                ['Ticks', false, true],
                ['ticks', false, true]
            ];

            for (const [key, asMilliseconds, asTicks] of objectFields) {
                if (value[key] === undefined || value[key] === null) continue;
                const parsed = parseClockValue(value[key], asMilliseconds, asTicks);
                if (parsed !== null) return parsed;
            }

            return null;
        }

        if (typeof value === 'string' && value.includes(':')) {
            const parts = value.split(':').map(part => Number(part));
            if (parts.some(part => !Number.isFinite(part))) return null;

            return parts.reduce((total, part) => (total * 60) + part, 0);
        }

        const num = Number(value);
        if (!Number.isFinite(num) || num < 0) return null;
        if (preferTicks || (!preferMilliseconds && num > 10000000)) return num / 10000000;
        if (preferMilliseconds || num > 10000) return num / 1000;

        return num;
    }

    function readTimedField(track, keys) {
        for (const key of keys) {
            if (!track) continue;

            const rawValue = key.includes('.')
                ? getNestedField(track, key)
                : track[key];

            if (rawValue === undefined || rawValue === null) continue;
            const preferMilliseconds = /ms$/i.test(key) || /milliseconds/i.test(key);
            const preferTicks = /ticks/i.test(key);
            const value = parseClockValue(rawValue, preferMilliseconds, preferTicks);
            if (value !== null) return value;
        }

        return null;
    }

    function readTrackTimeline(track) {
        let trackDuration = readTimedField(track, [
            'DurationSeconds',
            'durationSeconds',
            'DurationMs',
            'durationMs',
            'SongDurationMs',
            'songDurationMs',
            'DurationTicks',
            'durationTicks',
            'Duration',
            'duration',
            'TotalDuration',
            'totalDuration',
            'TotalDurationMs',
            'totalDurationMs',
            'TimelineProperties.Duration',
            'timelineProperties.duration',
            'Timeline.Duration',
            'timeline.duration',
            'EndTime',
            'endTime',
            'TimelineProperties.EndTime',
            'timelineProperties.endTime',
            'Timeline.EndTime',
            'timeline.endTime'
        ]);

        const timelineStart = readTimedField(track, [
            'StartTime',
            'startTime',
            'TimelineProperties.StartTime',
            'timelineProperties.startTime',
            'Timeline.StartTime',
            'timeline.startTime'
        ]);

        const timelineEnd = readTimedField(track, [
            'EndTime',
            'endTime',
            'TimelineProperties.EndTime',
            'timelineProperties.endTime',
            'Timeline.EndTime',
            'timeline.endTime'
        ]);

        if (
            timelineStart !== null &&
            timelineEnd !== null &&
            timelineEnd > timelineStart
        ) {
            trackDuration = timelineEnd - timelineStart;
        }

        let trackPosition = readTimedField(track, [
            'PositionSeconds',
            'positionSeconds',
            'PositionMs',
            'positionMs',
            'PositionTicks',
            'positionTicks',
            'CurrentTimeMs',
            'currentTimeMs',
            'CurrentTimeTicks',
            'currentTimeTicks',
            'CurrentTime',
            'currentTime',
            'Position',
            'position',
            'TimelinePosition',
            'timelinePosition',
            'PlaybackPosition',
            'playbackPosition',
            'ElapsedTime',
            'elapsedTime',
            'ElapsedSeconds',
            'elapsedSeconds',
            'ElapsedMilliseconds',
            'elapsedMilliseconds',
            'TimelineProperties.Position',
            'timelineProperties.position',
            'TimelineProperties.CurrentTime',
            'timelineProperties.currentTime',
            'Timeline.Position',
            'timeline.position',
            'Timeline.CurrentTime',
            'timeline.currentTime'
        ]);

        if (
            timelineStart !== null &&
            trackPosition !== null &&
            timelineStart > 0 &&
            timelineEnd !== null &&
            trackPosition >= timelineStart &&
            trackPosition <= timelineEnd
        ) {
            trackPosition -= timelineStart;
        }

        return {
            duration: trackDuration,
            position: trackPosition
        };
    }

    function readPlaybackState(track) {
        if (!track) return null;

        for (const key of ['IsPaused', 'isPaused', 'Paused', 'paused']) {
            if (track[key] === undefined || track[key] === null || track[key] === '') continue;
            const value = track[key];
            if (typeof value === 'boolean') return !value;

            const text = String(value).toLowerCase();
            if (text === 'true' || text === '1' || text.includes('paused')) return false;
            if (text === 'false' || text === '0' || text.includes('playing')) return true;
        }

        const state = getTrackField(track, [
            'PlaybackStatus',
            'playbackStatus',
            'PlaybackState',
            'playbackState',
            'Status',
            'status',
            'State',
            'state',
            'IsPlaying',
            'isPlaying',
            'Playing',
            'playing'
        ]);

        if (state === '') return null;
        if (typeof state === 'boolean') return state;

        const text = String(state).toLowerCase();
        if (text.includes('playing') || text === '4') return true;
        if (text.includes('paused') || text.includes('stopped') || text === '3' || text === '5') return false;

        return null;
    }

    function normalizeThumbnailSource(thumbnail) {
        const value = String(thumbnail || '').trim();
        if (!value) return '';
        if (/^(data:|blob:|https?:|file:)/i.test(value)) return value;

        const mime = value.startsWith('/9j/')
            ? 'image/jpeg'
            : value.startsWith('UklGR')
                ? 'image/webp'
                : 'image/png';

        return `data:${mime};base64,${value}`;
    }

    function cssUrl(value) {
        return `url("${String(value).replace(/"/g, '\\"')}")`;
    }

    function setArtwork(thumbnail) {
        const source = normalizeThumbnailSource(thumbnail);
        if (!source || source === currentThumb) return;

        currentThumb = source;
        bg.style.opacity = 0;

        setTimeout(() => {
            bg.style.backgroundImage = cssUrl(source);
            bg.style.opacity = 1;
        }, 300);

        setTimeout(() => {
            album.style.opacity = 0;

            setTimeout(() => {
                album.style.backgroundImage = cssUrl(source);
                album.style.opacity = 1;
            }, 250);
        }, 500);
    }

    function clearArtwork() {
        currentThumb = '';
        bg.style.opacity = 0;
        album.style.opacity = 0;

        setTimeout(() => {
            bg.style.backgroundImage = '';
            album.style.backgroundImage = '';
            bg.style.opacity = 1;
            album.style.opacity = 1;
        }, 300);
    }

    function resetNowPlaying() {
        titleEl.textContent = 'No music playing';
        artistEl.textContent = '';
        songNoteEl.textContent = '';

        mediaTitle = '';
        mediaArtist = '';
        activeSongKey = '';
        lastTitle = '';
        duration = 0;
        setBasePosition(0);
        lastTimelinePosition = null;
        setPlaybackState(false);
        livelyHasAudioSignal = false;
        livelyReceivedAudio = false;
        livelyAudioStartedAt = 0;
        lastPlaybackStateExplicit = false;
        hasExternalSongPosition = false;
        lastExternalSongPositionAt = 0;
        clearTimeout(lyricsSearchTimer);
        activeLyricsProvider = null;
        resetStableLyricsClock();
        lastLyricsDurationMs = -1;
        lyricsRequestId += 1;
        lyricsProviderHost.innerHTML = '';
        clearLyrics();
        clearArtwork();
    }

    function applyTimelineFields(track, now = performance.now()) {
        const timeline = readTrackTimeline(track);
        const nextDuration = timeline.duration;

        if (nextDuration !== null && nextDuration > 0) {
            duration = nextDuration;
        }

        const nextPosition = timeline.position;

        if (nextPosition !== null) {
            syncToExternalSongPosition(nextPosition, now);
        }

        return {
            hasDuration: nextDuration !== null && nextDuration > 0,
            hasPosition: nextPosition !== null
        };
    }

    function getInitialLivelyPosition(now, hadTrack) {
        if (
            !hadTrack &&
            livelyReceivedAudio &&
            livelyAudioStartedAt > 0 &&
            (livelyHasAudioSignal || now - lastAudioHeardAt < AUDIO_IDLE_MS)
        ) {
            return Math.max(0, (now - livelyAudioStartedAt) / 1000);
        }

        return 0;
    }

    function applyTrack(track) {
        if (!track) {
            resetNowPlaying();
            return;
        }

        const rawTitle = getTrackField(track, ['Title', 'title', 'Name', 'name']);
        const rawArtist = getTrackField(track, ['Artist', 'artist', 'AlbumArtist', 'albumArtist', 'Subtitle', 'subtitle']);

        if (!rawTitle) {
            resetNowPlaying();
            return;
        }

        const display = splitFeaturedArtists(rawTitle, rawArtist || '');
        titleEl.textContent = (display.title || rawTitle).toUpperCase();
        artistEl.textContent = display.artist.toUpperCase();
        songNoteEl.textContent = display.note ? display.note.toUpperCase() : '';

        mediaTitle = display.title || rawTitle;
        mediaArtist = display.artist || rawArtist || '';

        const now = performance.now();
        const songKey = makeSongKey(mediaTitle, mediaArtist);
        const playbackState = readPlaybackState(track);
        lastPlaybackStateExplicit = playbackState !== null;
        const hadTrack = Boolean(lastTitle);

        if (songKey !== lastTitle) {
            lastTitle = songKey;
            duration = 0;
            setBasePosition(getInitialLivelyPosition(now, hadTrack), now);
            lastTimelinePosition = null;
            hasExternalSongPosition = false;
            lastExternalSongPositionAt = 0;
            setPlaybackState(playbackState !== false, now);
            scheduleLyricsSearch();
        } else if (playbackState !== null) {
            setPlaybackState(playbackState, now);
        }

        applyTimelineFields(track, now);

        if (!livelyWallpaperPaused && playbackState === null && mediaTitle) {
            setPlaybackState(
                !livelyReceivedAudio ||
                livelyHasAudioSignal ||
                lastAudioHeardAt === 0 ||
                now - lastAudioHeardAt <= AUDIO_IDLE_MS,
                now
            );
        }

        const thumbnail = getTrackField(track, [
            'Thumbnail',
            'thumbnail',
            'AlbumArt',
            'albumArt',
            'Artwork',
            'artwork',
            'Cover',
            'cover'
        ]);

        setArtwork(thumbnail);
    }

    function livelyCurrentTrack(data) {
        try {
            const track = typeof data === 'string' ? JSON.parse(data) : data;
            applyTrack(track);
        } catch (error) {
            console.error('NovaMusic: Failed to parse Lively now-playing data', error);
        }
    }

    function refreshPlaybackFromAudio(now = performance.now()) {
        if (!mediaTitle || livelyWallpaperPaused) {
            setPlaybackState(false, now);
            return;
        }

        if (livelyHasAudioSignal) {
            setPlaybackState(true, now);
            return;
        }

        if (
            livelyReceivedAudio &&
            (lastAudioHeardAt === 0 || now - lastAudioHeardAt > AUDIO_IDLE_MS)
        ) {
            setPlaybackState(false, now);
        }
    }

    function livelyAudioListener(audioArray) {
        let values = audioArray;

        if (typeof values === 'string') {
            try {
                values = JSON.parse(values);
            } catch {
                values = [];
            }
        }

        if (!Array.isArray(values) || values.length === 0) return;

        livelyReceivedAudio = true;
        const average = values.reduce((sum, value) => sum + Math.abs(Number(value) || 0), 0) / values.length;
        const now = performance.now();
        const hasAudioSignal = average > AUDIO_ACTIVE_THRESHOLD;

        if (
            hasAudioSignal &&
            (!livelyHasAudioSignal || lastAudioHeardAt === 0 || now - lastAudioHeardAt > AUDIO_IDLE_MS)
        ) {
            livelyAudioStartedAt = now;
        }

        livelyHasAudioSignal = hasAudioSignal;

        if (livelyHasAudioSignal) {
            lastAudioHeardAt = now;
        } else {
            refreshPlaybackFromAudio(now);
            return;
        }

        refreshPlaybackFromAudio(now);
    }

    function livelyWallpaperPlaybackChanged(data) {
        try {
            const state = typeof data === 'string' ? JSON.parse(data) : data;
            livelyWallpaperPaused = Boolean(state && state.IsPaused);
            refreshPlaybackFromAudio();
        } catch (error) {
            console.error('NovaMusic: Failed to parse Lively pause event', error);
        }
    }

    ['contextmenu', 'copy', 'cut', 'dragstart', 'selectstart'].forEach(eventName => {
        document.addEventListener(eventName, event => event.preventDefault());
    });

    setInterval(refreshPlaybackFromAudio, 60);

    window.livelyCurrentTrack = livelyCurrentTrack;
    window.livelyAudioListener = livelyAudioListener;
    window.livelyWallpaperPlaybackChanged = livelyWallpaperPlaybackChanged;
</script>
